<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感熱紙列印稿 - 倒置與留白版</title>
    <style>
        /* 移除 body 預設邊距 */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: white; 
            width: 380px; 
            display: flex;
            flex-direction: column;
        }

        /* 旋轉容器 */
        .rotate-wrapper {
            width: 380px;
            transform: rotate(180deg);
            transform-origin: center center;
            display: flex;
            flex-direction: column;
        }

        .thermal-container {
            width: 380px; 
            margin: 0;
            /* 左右 25px 留白，上下不設 padding 方便精準控制留白 */
            padding: 0 25px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            box-sizing: border-box;
        }

        /* 文字上方留白 */
        .top-margin {
            height: 300px;
            width: 100%;
        }

        /* 文字樣式 */
        .thermal-text {
            width: 100%;
            font-size: 1.1rem; 
            font-weight: bold;
            line-height: 1.6; 
            color: black;
            word-wrap: break-word;
            white-space: pre-wrap; 
            text-align: left; 
            margin-bottom: 20px;
        }

        /* 圖片樣式 */
        .thermal-img {
            width: 100%; 
            filter: grayscale(100%) contrast(160%); 
            display: none;
            margin-bottom: 15px;
        }

        /* 按鈕/圖示容器樣式 */
        .action-buttons {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px; /* 底部留一點間距 */
        }

        /* 讚與倒讚圖示 (使用 Unicode 或實體) */
        .thermal-icon {
            font-size: 2.5rem;
            color: black;
            user-select: none;
        }

        @media print { 
            body, .rotate-wrapper { width: 380px; }
            /* 確保列印時背景色或圖片能顯示 */
            * { -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="rotate-wrapper">
        <div class="top-margin"></div>

        <div class="thermal-container">
            <div id="displayText" class="thermal-text"></div>

            <img id="displayImg" class="thermal-img">

            <div class="action-buttons">
                <span class="thermal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-thumbs-up-icon lucide-thumbs-up"><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/><path d="M7 10v12"/></svg>
                <span class="thermal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-thumbs-down-icon lucide-thumbs-down"><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"/><path d="M17 14V2"/></svg>
            </div>
        </div>
    </div>

    <script>
        // 解析 URL 參數
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('img');
        const textContent = params.get('text');

        // 渲染文字
        if (textContent) {
            document.getElementById('displayText').innerText = decodeURIComponent(textContent);
        }

        // 渲染圖片
        if (imgUrl && imgUrl !== 'undefined' && imgUrl !== 'null' && imgUrl !== '') {
            const imgEl = document.getElementById('displayImg');
            imgEl.src = decodeURIComponent(imgUrl);
            imgEl.style.display = 'block';
        }
    </script>
</body>
</html>
