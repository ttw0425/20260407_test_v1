<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感熱紙列印稿</title>
    <style>
        /* 移除 body 預設邊距，固定感熱紙寬度 */
        body { margin: 0; padding: 0; background-color: white; width: 380px; }

        .thermal-container {
            width: 380px; 
            margin: 0;
            /* 設定上下 30px 的對稱留白，左右 25px 保持邊框感 */
            padding: 30px 25px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            box-sizing: border-box;
        }

        /* 圖片樣式：寬度 100% (受限於父層 padding) */
        .thermal-img {
            width: 100%; 
            filter: grayscale(100%) contrast(160%); 
            margin-bottom: 25px; 
            display: none;
        }

        /* 文字樣式：字體較小，保持精緻感 */
        .thermal-text {
            width: 100%;
            font-size: 1.0rem; 
            font-weight: bold;
            line-height: 1.7; 
            color: black;
            word-wrap: break-word;
            white-space: pre-wrap; 
            text-align: left; 
        }

        @media print { 
            body, .thermal-container { width: 380px; }
        }
    </style>
</head>
<body>

    <div class="thermal-container">
        <img id="displayImg" class="thermal-img">
        
        <div id="displayText" class="thermal-text"></div>
    </div>

    <script>
        // 解析 URL 參數
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('img');
        const textContent = params.get('text');

        // 渲染圖片
        if (imgUrl && imgUrl !== 'undefined' && imgUrl !== 'null' && imgUrl !== '') {
            const imgEl = document.getElementById('displayImg');
            imgEl.src = decodeURIComponent(imgUrl);
            imgEl.style.display = 'block';
        }

        // 渲染文字
        if (textContent) {
            document.getElementById('displayText').innerText = decodeURIComponent(textContent);
        }
    </script>
</body>
</html>
