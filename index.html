<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀式感熱紙工具 - 輸入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { line-height: 1.9; background-color: #f3f4f6; } 
        .儀式卡片 {
            background: white; width: 92%; max-width: 450px;
            margin: 40px auto; padding: 40px 30px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        input, textarea { 
            background-color: #f5f5f5 !important; border: 1px solid #ddd !important; 
            border-radius: 4px; width: 100%; margin-bottom: 2.2rem; 
            padding: 15px; min-height: 50px; outline: none;
        }
        .儀式上傳框 { 
            border: 2px dashed #999; background: #ededed; 
            height: 140px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; margin-bottom: 2.5rem;
            color: #555; border-radius: 4px;
        }
        .btn-儀式完成 { 
            background-color: #d35400; color: white; width: 100%;
            padding: 15px; font-weight: bold; border-radius: 4px; letter-spacing: 2px;
        }
    </style>
</head>
<body class="flex justify-center py-10 px-4">
    <div class="儀式卡片">
        <h2 class="text-center text-2xl font-bold mb-10">列印內容製作</h2>
        
        <label class="font-bold block mb-2">上傳圖片</label>
        <div class="儀式上傳框" onclick="document.getElementById('fileInput').click()" id="uploadStatus">點擊上傳圖片</div>
        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="uploadToImgBB(this)">
        <input type="hidden" id="finalImgUrl">

        <label class="font-bold block mb-2">列印文字</label>
        <textarea id="textContent" placeholder="請輸入內容..."></textarea>
        
        <button class="btn-儀式完成" onclick="goToPrint()">完成並產生網頁</button>
    </div>

    <script>
        const IMGBB_KEY = 'c771d4d74bbeeac8401c8c2ec77452f0'; 

        async function uploadToImgBB(input) {
            const file = input.files[0];
            if (!file) return;
            document.getElementById('uploadStatus').innerText = "上傳中...";
            const formData = new FormData();
            formData.append('image', file);
            try {
                const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
                const res = await resp.json();
                if (res.success) {
                    document.getElementById('finalImgUrl').value = res.data.url;
                    document.getElementById('uploadStatus').innerText = "✔️ 上傳成功";
                }
            } catch (e) { alert("上傳失敗"); }
        }

        function goToPrint() {
            const img = encodeURIComponent(document.getElementById('finalImgUrl').value);
            const text = encodeURIComponent(document.getElementById('textContent').value);
            if (!img && !text) return alert("請輸入內容");
            // 跳轉到新的實體網頁
            window.location.href = `print.html?img=${img}&text=${text}`;
        }
    </script>
</body>
</html>
